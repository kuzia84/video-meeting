services:
  postgres:
    image: postgres:18-alpine
    container_name: video-meetings-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      # No hardcoded default — the password must be supplied via .env so no
      # credential value lives in this tracked file. `:?` makes `docker compose`
      # fail with a clear message if it is unset.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your .env}
      POSTGRES_DB: ${POSTGRES_DB:-video_meetings}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
